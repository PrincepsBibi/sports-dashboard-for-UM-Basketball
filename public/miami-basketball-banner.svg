<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1502 494" role="img" aria-labelledby="title desc">
  <title id="title">Miami Hurricanes Basketball Banner</title>
  <desc id="desc">Green Miami Hurricanes basketball banner with orange and white typography and a U mark.</desc>
  <defs>
    <radialGradient id="leftGlow" cx="10%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1f7a4a"/>
      <stop offset="55%" stop-color="#0f5132"/>
      <stop offset="100%" stop-color="#0a2f22"/>
    </radialGradient>
    <linearGradient id="orangePanel" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.08"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1502" height="494" fill="url(#leftGlow)"/>
  <rect width="1502" height="494" fill="url(#dots)"/>

