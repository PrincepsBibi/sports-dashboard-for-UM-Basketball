    <text x="245" y="66" font-family="Arial, Helvetica, sans-serif" font-size="43" font-weight="900" letter-spacing="34" fill="#f97316">BASKETBALL</text>
    <text x="532" y="112" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="12" fill="#ffffff" opacity="0.95">MIAMI HURRICANES</text>
